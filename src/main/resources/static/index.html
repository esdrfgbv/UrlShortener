<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>URL Shortener</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <h1>URL Shortener</h1>

        <input type="text" id="longUrl" placeholder="Enter your long URL">

        <label class="label">Choose Expiration Date & Time</label> <input type="datetime-local" id="expiry">

        <button onclick="shorten()">Generate Short Link</button>

        <div class="result" id="resultBox">
            <p>Your link will appear here</p>
        </div>

    </div>

    <script>

        async function shorten() {

            const longUrl = document.getElementById("longUrl").value.trim();
            const expiry = document.getElementById("expiry").value;
            const resultBox = document.getElementById("resultBox");

            if (longUrl === "") {
                resultBox.innerHTML = "<p style='color:red;'>Enter a URL</p>";
                return;
            }

            if (expiry === "") {
                resultBox.innerHTML = "<p style='color:red;'>Select expiration date</p>";
                return;
            }

            try {

                const response = await fetch("/generate", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        url: longUrl,
                        expirationDate: expiry
                    })
                });

                const data = await response.json();

                console.log(data);

                if (data.shortLink) {

                    const fullUrl = window.location.origin + "/" + data.shortLink;

                    resultBox.innerHTML = `
<h3>Shortened URL</h3>
<input type="text" value="${fullUrl}" id="shortUrl" readonly style="width:80%">
<button onclick="copyLink()">Copy</button>
<p>Expires on: ${data.expirationDate}</p>
`;

                } else {

                    resultBox.innerHTML =
                        `<p style="color:red;">${data.error}</p>`;

                }

            } catch (err) {

                resultBox.innerHTML =
                    "<p style='color:red;'>Server not reachable</p>";

            }

        }

        function copyLink() {

            const copyText = document.getElementById("shortUrl");

            copyText.select();
            copyText.setSelectionRange(0, 99999);

            navigator.clipboard.writeText(copyText.value);

            alert("Link copied to clipboard");

        }

    </script>

</body>

</html>
